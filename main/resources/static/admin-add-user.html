<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chapter One — Admin: Add User</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
        :root{
          --bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1f1f23;
          --border:rgba(255,255,255,0.08);--accent:#2563eb;--accent-h:#1d4ed8;
          --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
          --danger:#ef4444;--success:#22c55e;--gold:#d4a944;
          --font-head:'Lora',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;
          --radius:12px;
        }
        body.light{
          --bg:#faf7f2;--surface:#fff;--surface2:#f5f0e8;--surface3:#ede8de;
          --border:rgba(0,0,0,0.09);--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;--gold:#b8860b;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:var(--font-body);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}

        /* ── Nav ── */
        .nav{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
        .nav-logo{font-family:var(--font-head);font-size:1.5rem;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-0.02em;}
        .nav-logo sup{font-size:0.55rem;font-family:var(--font-body);letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);vertical-align:super;}
        .nav-right{display:flex;align-items:center;gap:0.6rem;}
        .nav-link{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.4rem 0.85rem;font-size:0.82rem;color:var(--text2);text-decoration:none;transition:all .2s;}
        .nav-link:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
        .btn-text{background:none;border:none;color:var(--text3);font-size:0.82rem;cursor:pointer;padding:0.4rem 0.6rem;}
        .btn-text:hover{color:var(--text);}
        .theme-btn{font-size:0.9rem;padding:0.4rem 0.6rem;}
        .admin-badge{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.25);border-radius:9999px;padding:0.25rem 0.65rem;}

        /* ── Admin Dropdown ── */
        .admin-dropdown{position:relative;display:inline-block;}
        .admin-dropdown-btn{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:0.4rem 0.85rem;font-size:0.82rem;font-family:var(--font-body);cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;transition:all .2s;}
        .admin-dropdown-btn:hover{background:rgba(37,99,235,.25);}
        .admin-dropdown-btn .arrow{font-size:0.65rem;transition:transform .2s;}
        .admin-dropdown.open .admin-dropdown-btn .arrow{transform:rotate(180deg);}
        .admin-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);min-width:190px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.35);}
        .admin-dropdown.open .admin-dropdown-menu{display:block;}
        .admin-dropdown-menu a{display:flex;align-items:center;gap:0.6rem;padding:0.65rem 1rem;font-size:0.83rem;color:var(--text2);text-decoration:none;transition:background .15s;}
        .admin-dropdown-menu a:hover{background:var(--surface3);color:var(--text);}
        .admin-dropdown-menu a.active{color:var(--text);background:var(--surface3);}
        .menu-icon{font-size:1rem;width:20px;text-align:center;}
        .menu-divider{height:1px;background:var(--border);margin:4px 0;}

        /* ── Layout ── */
        .container{max-width:560px;margin:0 auto;padding:3rem 2rem 5rem;}

        /* ── Page Header ── */
        .page-eyebrow{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
        .page-title{font-family:var(--font-head);font-size:2rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);margin-bottom:0.3rem;}
        .page-sub{font-size:0.88rem;color:var(--text2);margin-bottom:2rem;}

        /* ── Card ── */
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;}

        /* ── Fields ── */
        .field{margin-bottom:1.25rem;}
        .field label{display:block;font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-bottom:0.45rem;}
        .field input, .field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0.7rem 1rem;color:var(--text);font-size:0.88rem;font-family:var(--font-body);outline:none;transition:border-color .2s;}
        .field input:focus, .field select:focus{border-color:var(--accent);}
        .field input::placeholder{color:var(--text3);}
        .field select option{background:var(--surface2);}

        /* ── Role toggle ── */
        .role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
        .role-option{position:relative;}
        .role-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
        .role-option label{display:flex;align-items:center;gap:0.55rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:0.7rem 1rem;font-size:0.85rem;color:var(--text2);cursor:pointer;transition:all .2s;}
        .role-option input:checked + label{border-color:var(--accent);background:rgba(37,99,235,.1);color:var(--text);}
        .role-icon{font-size:1.1rem;}
        .role-name{font-weight:600;}
        .role-desc{font-size:0.72rem;color:var(--text3);display:block;margin-top:1px;}

        /* ── Password strength ── */
        .pw-strength{height:3px;border-radius:2px;margin-top:6px;background:var(--surface3);overflow:hidden;}
        .pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s, background .3s;}
        .pw-hint{font-size:0.72rem;color:var(--text3);margin-top:4px;}

        /* ── Submit ── */
        .btn-submit{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;font-family:var(--font-body);padding:0.85rem;cursor:pointer;transition:background .2s;margin-top:0.5rem;}
        .btn-submit:hover{background:var(--accent-h);}
        .btn-submit:disabled{opacity:0.55;cursor:not-allowed;}

        /* ── Success state ── */
        .success-banner{display:none;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:0.85rem;color:#4ade80;}
        .success-banner.show{display:flex;align-items:center;gap:0.6rem;}

        /* ── Toast ── */
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;min-width:220px;max-width:320px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.8rem 1.1rem;border-radius:var(--radius);font-size:0.84rem;z-index:999;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
        .toast.show{opacity:1;transform:translateY(0);}
        .toast.success{border-left:3px solid var(--success);}
        .toast.error{border-left:3px solid var(--danger);}
    </style>
</head>
<body>

<nav class="nav">
    <a href="/index.html" class="nav-logo">Chapter<sup>One</sup></a>
    <div class="nav-right">
        <span class="admin-badge">Admin</span>

        <div class="admin-dropdown" id="adminDropdown">
            <button class="admin-dropdown-btn" onclick="toggleAdminDropdown()">
                ⚙️ Admin Tools <span class="arrow">▾</span>
            </button>
            <div class="admin-dropdown-menu">
                <a href="/index.html"><span class="menu-icon">📚</span>Manage Catalog</a>
                <a href="/admin-orders.html"><span class="menu-icon">📋</span>Manage Orders</a>
                <div class="menu-divider"></div>
                <a href="/admin-add-user.html" class="active"><span class="menu-icon">👤</span>Add User</a>
            </div>
        </div>

        <button class="btn-text" onclick="logout()">Sign out</button>
        <button class="nav-link theme-btn" id="themeBtn" onclick="toggleTheme()">🌓</button>
    </div>
</nav>

<div class="container">
    <div class="page-eyebrow">Admin Panel</div>
    <div class="page-title">Add User</div>
    <div class="page-sub">Create a new account with a selected role.</div>

    <div class="success-banner" id="successBanner">
        ✅ <span id="successMsg"></span>
    </div>

    <div class="form-card">
        <div class="field">
            <label>Full Name *</label>
            <input type="text" id="uName" placeholder="e.g. Juan dela Cruz" autocomplete="off"/>
        </div>

        <div class="field">
            <label>Email Address *</label>
            <input type="email" id="uEmail" placeholder="user@example.com" autocomplete="off"/>
        </div>

        <div class="field">
            <label>Password *</label>
            <input type="password" id="uPassword" placeholder="Min. 6 characters" oninput="updateStrength()"/>
            <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
            <div class="pw-hint" id="pwHint">Enter a password</div>
        </div>

        <div class="field">
            <label>Role *</label>
            <div class="role-toggle">
                <div class="role-option">
                    <input type="radio" name="role" id="roleUser" value="user" checked/>
                    <label for="roleUser">
                        <span class="role-icon">👤</span>
                        <span>
              <span class="role-name">User</span>
              <span class="role-desc">Browse &amp; purchase books</span>
            </span>
                    </label>
                </div>
                <div class="role-option">
                    <input type="radio" name="role" id="roleAdmin" value="admin"/>
                    <label for="roleAdmin">
                        <span class="role-icon">🛡️</span>
                        <span>
              <span class="role-name">Admin</span>
              <span class="role-desc">Full catalog &amp; order access</span>
            </span>
                    </label>
                </div>
            </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitAddUser()">Create Account</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    'use strict';

    function getUser(){ try{ return JSON.parse(localStorage.getItem('user')); }catch{ return null; } }
    function logout(){ localStorage.removeItem('user'); localStorage.removeItem('cart'); window.location.href='/login.html'; }

    function initTheme(){
      if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
      updateThemeBtn();
    }
    function toggleTheme(){
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark');
      updateThemeBtn();
    }
    function updateThemeBtn(){
      const b=document.getElementById('themeBtn');
      if(b) b.textContent=document.body.classList.contains('light')?'🌙':'🌓';
    }

    function toggleAdminDropdown(){
      document.getElementById('adminDropdown').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const dd = document.getElementById('adminDropdown');
      if(dd && !dd.contains(e.target)) dd.classList.remove('open');
    });

    // Guard: redirect non-admins
    (function(){
      const u = getUser();
      if(!u || !u.admin) window.location.href = '/index.html';
    })();

    // ── Password strength ─────────────────────────────────
    function updateStrength(){
      const pw = document.getElementById('uPassword').value;
      const bar = document.getElementById('pwBar');
      const hint = document.getElementById('pwHint');
      let score = 0;
      if(pw.length >= 6)  score++;
      if(pw.length >= 10) score++;
      if(/[A-Z]/.test(pw)) score++;
      if(/[0-9]/.test(pw)) score++;
      if(/[^A-Za-z0-9]/.test(pw)) score++;

      const levels = [
        { w:'0%',   bg:'transparent', text:'Enter a password' },
        { w:'25%',  bg:'#ef4444',     text:'Too short' },
        { w:'50%',  bg:'#f59e0b',     text:'Weak' },
        { w:'70%',  bg:'#eab308',     text:'Fair' },
        { w:'85%',  bg:'#84cc16',     text:'Good' },
        { w:'100%', bg:'#22c55e',     text:'Strong' },
      ];
      const lvl = pw.length === 0 ? 0 : Math.max(1, Math.min(score, 5));
      bar.style.width      = levels[lvl].w;
      bar.style.background = levels[lvl].bg;
      hint.textContent     = levels[lvl].text;
    }

    // ── Submit ────────────────────────────────────────────
    async function submitAddUser(){
      const name     = document.getElementById('uName').value.trim();
      const email    = document.getElementById('uEmail').value.trim();
      const password = document.getElementById('uPassword').value;
      const isAdmin  = document.querySelector('input[name="role"]:checked').value === 'admin';

      if(!name)             { toast('Name is required','error'); return; }
      if(!email)            { toast('Email is required','error'); return; }
      if(password.length<6) { toast('Password must be at least 6 characters','error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Creating…';

      try{
        const res = await fetch('/api/auth/admin/create-user', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'X-User-Admin':'true' },
          body: JSON.stringify({ name, email, password, admin: isAdmin })
        });
        const data = await res.json();
        if(!res.ok){ toast(data.message || 'Failed to create user','error'); return; }

        // Show success banner and reset form
        const banner = document.getElementById('successBanner');
        document.getElementById('successMsg').textContent =
          `Account created for ${data.name} (${isAdmin ? 'Admin' : 'User'})`;
        banner.classList.add('show');
        setTimeout(() => banner.classList.remove('show'), 5000);

        document.getElementById('uName').value = '';
        document.getElementById('uEmail').value = '';
        document.getElementById('uPassword').value = '';
        document.getElementById('roleUser').checked = true;
        updateStrength();
        toast(`${data.name} added successfully`, 'success');
      } catch{
        toast('Network error','error');
      } finally{
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    let toastTimer;
    function toast(msg,type=''){
      clearTimeout(toastTimer);
      const el=document.getElementById('toast');
      el.textContent=msg; el.className=`toast ${type} show`;
      toastTimer=setTimeout(()=>el.className='toast',3500);
    }

    initTheme();
</script>
</body>
</html>
