<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA — Bookstore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #05080f;
      --surface:  #0d1321;
      --surface2: #131c2e;
      --border:   rgba(255,255,255,0.07);
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --accent-glow: rgba(37,99,235,0.25);
      --text:     #f1f5f9;
      --muted:    #64748b;
      --faint:    #1e293b;
      --white:    #ffffff;
      --danger:   #ef4444;
      --success:  #22c55e;
    }

    /* Light mode variables */
    body.light-mode {
      --bg:       #f8fafc;
      --surface:  #ffffff;
      --surface2: #f1f5f9;
      --border:   rgba(0,0,0,0.08);
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --text:     #0f172a;
      --muted:    #64748b;
      --faint:    #e2e8f0;
      --white:    #0f172a;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background 0.3s, color 0.3s;}

    /* ── Navbar ── */
    .nav{position:sticky;top:0;z-index:100;background:rgba(var(--bg-rgb),0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .nav-brand{font-size:1.2rem;font-weight:700;letter-spacing:0.08em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:0.5rem;}
    .nav-brand span{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 10px var(--accent);}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-user{font-size:0.8rem;color:var(--muted);padding:0.35rem 0.8rem;border:1px solid var(--border);border-radius:9999px;}
    .nav-cart{position:relative;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.45rem 0.9rem;font-size:0.85rem;color:var(--text);display:flex;align-items:center;gap:0.5rem;transition:border-color 0.2s;}
    .nav-cart:hover{border-color:rgba(255,255,255,0.2);}
    body.light-mode .nav-cart:hover{border-color:rgba(0,0,0,0.2);}
    .cart-badge{background:var(--accent);color:#fff;font-size:0.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-6px;right:-6px;}
    .btn-nav{padding:0.45rem 1rem;border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .btn-outline:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}
    body.light-mode .btn-outline:hover{border-color:rgba(0,0,0,0.2);}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:var(--accent-h);}
    .btn-ghost{background:transparent;border:none;color:var(--muted);font-size:0.82rem;cursor:pointer;padding:0.45rem 0.7rem;}
    .btn-ghost:hover{color:var(--text);}

    /* Theme Toggle Button in Navbar */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    /* ── Container ── */
    .container{max-width:1280px;margin:0 auto;padding:2.5rem 2rem;}

    /* ── Hero strip ── */
    .hero{padding:3rem 2rem 2rem;text-align:center;max-width:600px;margin:0 auto;}
    .hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:700;letter-spacing:-0.04em;line-height:1.1;color:var(--text);}
    .hero h1 em{font-style:normal;color:var(--accent);}
    .hero p{margin-top:0.75rem;color:var(--muted);font-size:0.95rem;}

    /* ── Search & Filter bar ── */
    .toolbar{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;margin-bottom:2rem;}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem 0.7rem 2.5rem;color:var(--text);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap input::placeholder{color:var(--muted);}
    .search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none;}
    select.filter{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem;color:var(--text);font-size:0.85rem;outline:none;cursor:pointer;transition:border-color 0.2s;}
    select.filter:focus{border-color:var(--accent);}
    select.filter option{background:var(--surface2);}

    /* ── Book grid ── */
    .book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.25rem;}
    .book-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;cursor:pointer;}
    .book-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.14);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
    body.light-mode .book-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.1);}
    .book-thumb{height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border-bottom:1px solid var(--border);}
    .book-body{padding:1rem;flex:1;display:flex;flex-direction:column;gap:0.3rem;}
    .book-cat{font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);}
    .book-title{font-size:0.9rem;font-weight:600;color:var(--text);line-height:1.3;}
    .book-author{font-size:0.78rem;color:var(--muted);}
    .book-price{font-size:1rem;font-weight:700;color:var(--text);margin-top:auto;padding-top:0.5rem;}
    .book-footer{padding:0.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;}
    .btn-add{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.5rem;font-size:0.82rem;font-weight:500;cursor:pointer;transition:background 0.2s;}
    .btn-add:hover{background:var(--accent-h);}
    .stock-badge{font-size:0.7rem;color:var(--muted);align-self:center;}
    .stock-out{color:var(--danger);}

    /* ── Admin panel ── */
    .admin-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:2rem;}
    .admin-panel h3{font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
    .admin-form{display:flex;flex-wrap:wrap;gap:0.6rem;align-items:flex-end;}
    .admin-form input,.admin-form textarea,.admin-form select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.9rem;color:var(--text);font-size:0.83rem;outline:none;transition:border-color 0.2s;}
    .admin-form input:focus,.admin-form textarea:focus,.admin-form select:focus{border-color:var(--accent);}
    .admin-form input::placeholder,.admin-form textarea::placeholder{color:var(--muted);}
    .admin-form textarea{resize:none;height:70px;}

    /* ── Cart drawer ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .cart-drawer{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(.4,0,.2,1);}
    .cart-drawer.open{transform:translateX(0);}
    .drawer-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .drawer-header h2{font-size:1rem;font-weight:600;color:var(--text);}
    .close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:color 0.2s;}
    .close-btn:hover{color:var(--text);}
    .drawer-body{flex:1;overflow-y:auto;padding:1rem;}
    .cart-item{display:flex;align-items:center;gap:1rem;padding:0.85rem 0;border-bottom:1px solid var(--border);}
    .cart-item-icon{width:44px;height:44px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .cart-item-info{flex:1;}
    .cart-item-title{font-size:0.88rem;font-weight:500;color:var(--text);}
    .cart-item-price{font-size:0.78rem;color:var(--muted);}
    .cart-item-qty{display:flex;align-items:center;gap:0.4rem;}
    .qty-btn{width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;}
    .qty-btn:hover{border-color:rgba(255,255,255,0.2);}
    .remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:0.3rem;}
    .remove-btn:hover{color:var(--danger);}
    .drawer-footer{padding:1.25rem;border-top:1px solid var(--border);}
    .cart-total-row{display:flex;justify-content:space-between;margin-bottom:1rem;}
    .cart-total-label{color:var(--muted);font-size:0.9rem;}
    .cart-total-val{font-size:1.1rem;font-weight:700;color:var(--text);}
    .btn-checkout{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.85rem;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
    .btn-checkout:hover{background:var(--accent-h);}
    .empty-cart{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:0.9rem;}

    /* ── Toast ── */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.75rem 1.2rem;border-radius:10px;font-size:0.85rem;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;max-width:280px;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.success{border-color:rgba(34,197,94,0.4);color:var(--success);}
    .toast.error{border-color:rgba(239,68,68,0.4);color:var(--danger);}

    /* ── Empty/loading states ── */
    .state-msg{text-align:center;padding:4rem 1rem;color:var(--muted);}
    .state-msg .icon{font-size:2.5rem;margin-bottom:0.75rem;}

    /* ── Responsive ── */
    @media(max-width:640px){
      .nav{padding:0 1rem;}
      .container{padding:1.5rem 1rem;}
      .hero h1{font-size:1.8rem;}
      .book-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
      .admin-form{flex-direction:column;}
      .admin-form input,.admin-form textarea,.admin-form select{width:100%;}
      .theme-toggle span {display: none;}
    }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────── -->
<nav class="nav">
  <a href="/index.html" class="nav-brand">
    <span></span>NOVA
  </a>
  <div class="nav-right">
    <div id="navUser" class="nav-user" style="display:none"></div>
    <div class="nav-cart" onclick="toggleCart()">
      🛒 Cart
      <div class="cart-badge" id="cartBadge">0</div>
    </div>
    <a href="/orders.html" class="btn-nav btn-outline" id="ordersLink" style="display:none">Orders</a>
    <a href="/login.html" class="btn-nav btn-outline" id="loginLink">Login</a>
    <button class="btn-nav btn-ghost" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
      🌓 <span>Theme</span>
    </button>
  </div>
</nav>

<!-- ── Hero ────────────────────────────────────────────── -->
<div class="hero">
  <h1>Every story<br/>starts with a <em>search.</em></h1>
  <p>Discover your next read from our curated catalog.</p>
</div>

<!-- ── Main Content ─────────────────────────────────────── -->
<div class="container">

  <!-- Admin panel (only visible for admins) -->
  <div class="admin-panel" id="adminPanel" style="display:none">
    <h3>⚙ Manage Books</h3>
    <div class="admin-form">
      <input type="text" id="aTitle"    placeholder="Title" style="flex:2;min-width:140px"/>
      <input type="text" id="aAuthor"   placeholder="Author" style="flex:1;min-width:120px"/>
      <input type="number" id="aPrice"  placeholder="Price" step="0.01" style="width:90px"/>
      <input type="number" id="aStock"  placeholder="Stock" style="width:80px"/>
      <input type="text" id="aCategory" placeholder="Category" style="width:120px"/>
      <textarea id="aDesc" placeholder="Description (optional)"></textarea>
      <button class="btn-add" style="width:auto;padding:0.6rem 1.2rem" onclick="adminAddBook()">+ Add Book</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by title or author…" oninput="handleSearch()"/>
    </div>
    <select class="filter" id="categoryFilter" onchange="handleFilter()">
      <option value="">All Categories</option>
    </select>
    <select class="filter" id="sortFilter" onchange="renderBooks()">
      <option value="title">Sort: Title</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
    </select>
  </div>

  <!-- Book grid -->
  <div class="book-grid" id="bookGrid">
    <div class="state-msg" style="grid-column:1/-1">
      <div class="icon">📚</div>
      Loading catalog…
    </div>
  </div>

</div>

<!-- ── Cart Drawer ──────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="drawer-body" id="cartBody"></div>
  <div class="drawer-footer" id="cartFooter" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cartTotal">₱0.00</span>
    </div>
    <button class="btn-checkout" onclick="checkout()">Checkout →</button>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
  const API = '';   // same origin — Spring Boot serves both frontend and API
  let allBooks = [];
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  // ── Auth ─────────────────────────────────────────────────
  function getUser() {
    const raw = localStorage.getItem('user');
    return raw ? JSON.parse(raw) : null;
  }

  function getAuthToken() {
    return localStorage.getItem('token');
  }

  function logout() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    localStorage.removeItem('cart');
    window.location.href = '/login.html';
  }

  function initNav() {
    const user = getUser();
    if (user) {
      document.getElementById('navUser').textContent  = `Hi, ${user.name}`;
      document.getElementById('navUser').style.display = 'flex';
      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('logoutBtn').style.display  = 'inline-flex';
      document.getElementById('ordersLink').style.display = 'inline-flex';
      if (user.admin) document.getElementById('adminPanel').style.display = 'block';
    }
  }

  // ── Theme ─────────────────────────────────────────────────
  function toggleTheme() {
    const body = document.body;
    body.classList.toggle("light-mode");
    const isLight = body.classList.contains("light-mode");
    localStorage.setItem("theme", isLight ? "light" : "dark");
    const btn = document.getElementById("themeToggle");
    if (btn) btn.innerHTML = isLight ? "☀️ <span>Light</span>" : "🌓 <span>Theme</span>";
  }

  function initTheme() {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
      document.body.classList.add("light-mode");
      const btn = document.getElementById("themeToggle");
      if(btn) btn.innerHTML = "☀️ <span>Light</span>";
    }
  }

  // ── Books ────────────────────────────────────────────────
  async function loadBooks() {
    try {
      const res = await fetch(`${API}/api/books`);
      allBooks = await res.json();
      populateCategories();
      renderBooks();
    } catch(e) {
      document.getElementById('bookGrid').innerHTML =
        `<div class="state-msg" style="grid-column:1/-1"><div class="icon">⚠️</div>Failed to load books. Is the server running?</div>`;
    }
  }

  function populateCategories() {
    const cats = [...new Set(allBooks.map(b => b.category).filter(Boolean))].sort();
    const sel = document.getElementById('categoryFilter');
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }

  function handleSearch() { renderBooks(); }
  function handleFilter() { renderBooks(); }

  function renderBooks() {
    const keyword  = document.getElementById('searchInput').value.toLowerCase().trim();
    const category = document.getElementById('categoryFilter').value;
    const sort     = document.getElementById('sortFilter').value;

    let books = allBooks.filter(b => {
      const matchesKw  = !keyword || b.title.toLowerCase().includes(keyword) || b.author.toLowerCase().includes(keyword);
      const matchesCat = !category || b.category === category;
      return matchesKw && matchesCat;
    });

    if (sort === 'price-asc')  books.sort((a,b) => a.price - b.price);
    if (sort === 'price-desc') books.sort((a,b) => b.price - a.price);
    if (sort === 'title')      books.sort((a,b) => a.title.localeCompare(b.title));

    const grid = document.getElementById('bookGrid');

    if (books.length === 0) {
      grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1"><div class="icon">🔍</div>No books found.</div>`;
      return;
    }

    grid.innerHTML = books.map(b => `
      <div class="book-card">
        <div class="book-thumb">${bookEmoji(b.category)}</div>
        <div class="book-body">
          <div class="book-cat">${esc(b.category || 'General')}</div>
          <div class="book-title">${esc(b.title)}</div>
          <div class="book-author">by ${esc(b.author)}</div>
          <div class="book-price">₱${b.price.toFixed(2)}</div>
        </div>
        <div class="book-footer">
          <button class="btn-add" onclick="addToCart(${b.id},'${esc(b.title)}',${b.price})"
            ${b.stock <= 0 ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>
            ${b.stock <= 0 ? 'Out of Stock' : '+ Add to Cart'}
          </button>
          <span class="stock-badge ${b.stock <= 0 ? 'stock-out' : ''}">${b.stock > 0 ? b.stock + ' left' : 'None'}</span>
        </div>
      </div>
    `).join('');
  }

  function bookEmoji(cat) {
    const map = { fiction:'📖', science:'🔬', history:'🏛️', programming:'💻', poetry:'✍️', children:'🧸', romance:'💗', mystery:'🔍', fantasy:'🧙' };
    return map[(cat||'').toLowerCase()] || '📚';
  }

  // ── Admin ────────────────────────────────────────────────
  async function adminAddBook() {
    const token = getAuthToken();
    if (!token) {
      toast('Please login as admin', 'error');
      return;
    }

    const book = {
      title:       document.getElementById('aTitle').value.trim(),
      author:      document.getElementById('aAuthor').value.trim(),
      price:       parseFloat(document.getElementById('aPrice').value) || 0,
      stock:       parseInt(document.getElementById('aStock').value) || 0,
      category:    document.getElementById('aCategory').value.trim(),
      description: document.getElementById('aDesc').value.trim(),
    };
    if (!book.title || !book.author) return toast('Title and author are required', 'error');

    const res = await fetch(`${API}/api/books`, {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(book)
    });
    if (res.ok) {
      toast('Book added!', 'success');
      ['aTitle','aAuthor','aPrice','aStock','aCategory','aDesc'].forEach(id => document.getElementById(id).value = '');
      loadBooks();
    } else {
      toast('Failed to add book', 'error');
    }
  }

  // ── Cart ─────────────────────────────────────────────────
  function addToCart(id, title, price) {
    const existing = cart.find(i => i.id === id);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ id, title, price, qty: 1 });
    }
    saveCart();
    renderCartBadge();
    toast(`"${title}" added to cart`, 'success');
  }

  function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

  function renderCartBadge() {
    const total = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cartBadge').textContent = total;
  }

  function toggleCart() {
    const drawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('overlay');
    drawer.classList.toggle('open');
    overlay.classList.toggle('open');
    renderCartDrawer();
  }

  function renderCartDrawer() {
    const body   = document.getElementById('cartBody');
    const footer = document.getElementById('cartFooter');

    if (cart.length === 0) {
      body.innerHTML = `<div class="empty-cart">🛒<br/>Your cart is empty.<br/><br/><a href="#" onclick="toggleCart()" style="color:var(--accent)">Continue browsing</a></div>`;
      footer.style.display = 'none';
      return;
    }

    body.innerHTML = cart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-icon">${bookEmoji('')}</div>
        <div class="cart-item-info">
          <div class="cart-item-title">${esc(item.title)}</div>
          <div class="cart-item-price">₱${item.price.toFixed(2)} each</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${idx})">✕</button>
      </div>
    `).join('');

    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('cartTotal').textContent = `₱${total.toFixed(2)}`;
    footer.style.display = 'block';
  }

  function changeQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    saveCart(); renderCartBadge(); renderCartDrawer();
  }

  function removeFromCart(idx) {
    cart.splice(idx, 1);
    saveCart(); renderCartBadge(); renderCartDrawer();
  }

  // ── CHECKOUT - FIXED VERSION ─────────────────────────────
  async function checkout() {
    const user = getUser();
    const token = getAuthToken();

    if (!user || !token) {
      toast('Please login to checkout', 'error');
      setTimeout(() => window.location.href = '/login.html', 1000);
      return;
    }

    if (cart.length === 0) {
      toast('Your cart is empty', 'error');
      return;
    }

    const items = cart.map(i => ({
      bookId: i.id,
      bookTitle: i.title,
      priceAtPurchase: i.price,
      quantity: i.qty
    }));

    try {
      const res = await fetch(`${API}/api/orders`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ items })
      });

      if (res.ok) {
        cart = [];
        saveCart();
        renderCartBadge();
        renderCartDrawer();
        toggleCart();
        toast('Order placed successfully!', 'success');
        setTimeout(() => window.location.href = '/orders.html', 1200);
      } else {
        const error = await res.json();
        toast(error.error || 'Checkout failed. Please try again.', 'error');
      }
    } catch (err) {
      console.error('Checkout error:', err);
      toast('Network error. Please try again.', 'error');
    }
  }

  // ── Toast ─────────────────────────────────────────────────
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.className = 'toast', 3000);
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str ?? '';
    return d.innerHTML;
  }

  // ── Init ──────────────────────────────────────────────────
  initTheme();
  initNav();
  renderCartBadge();
  loadBooks();
</script>
</body>
</html>
