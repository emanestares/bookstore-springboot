<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter One — Admin: User Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="icon.png"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav">
  <a href="/index.html" class="nav-logo">Chapter<sup>One</sup></a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>

    <div class="admin-dropdown" id="adminDropdown">
      <button class="admin-dropdown-btn" onclick="toggleAdminDropdown()">
        ⚙️ Admin Tools <span class="arrow">▾</span>
      </button>
      <div class="admin-dropdown-menu">
        <a href="/index.html"><span class="menu-icon">📚</span>Manage Catalog</a>
        <a href="/admin-orders.html"><span class="menu-icon">📋</span>Manage Orders</a>
        <div class="menu-divider"></div>
        <a href="/admin-users.html" class="active"><span class="menu-icon">👥</span>User Management</a>
      </div>
    </div>

    <button class="btn-text" onclick="logout()">Sign out</button>
    <button class="nav-link" id="themeBtn" onclick="toggleTheme()" style="font-size:.9rem;padding:.4rem .6rem">🌓</button>
  </div>
</nav>

<!-- ── Main Content ── -->
<div class="container">

  <!-- Page Header -->
  <div class="page-head">
    <div>
      <div class="page-eyebrow">Admin Panel</div>
      <div class="page-title">User Management</div>
      <div class="page-sub">View, edit, and create user accounts</div>
    </div>
    <button class="nav-link" onclick="loadUsers()">↻ Refresh</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-dashboard" onclick="switchTab('dashboard')">👥 All Users</button>
    <button class="tab-btn"        id="tab-add"       onclick="switchTab('add')">＋ Add User</button>
  </div>

  <!-- ── ALL USERS TAB ── -->
  <div class="tab-panel active" id="panel-dashboard">
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clip-rule="evenodd"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by name, email, or ID…" oninput="resetAndRender()"/>
      </div>
      <select class="pill" id="roleFilter" onchange="resetAndRender()">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
      </select>
      <span class="count-tag" id="countTag"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('id')"    id="th-id">   ID <span id="si-id"></span></th>
            <th class="no-sort" style="width:36px"></th>
            <th onclick="setSort('name')"  id="th-name"> Name <span id="si-name"></span></th>
            <th onclick="setSort('email')" id="th-email">Email <span id="si-email"></span></th>
            <th class="no-sort">Role</th>
            <th class="no-sort"></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="state-row">
            <td colspan="6"><span class="state-icon">⏳</span>Loading users…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ── ADD USER TAB ── -->
  <div class="tab-panel" id="panel-add">
    <div class="success-banner" id="successBanner">
      ✅ <span id="successMsg"></span>
    </div>

    <div class="form-card">
      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="uName" placeholder="e.g. Juan dela Cruz" autocomplete="off"/>
      </div>

      <div class="field">
        <label>Email Address *</label>
        <input type="email" id="uEmail" placeholder="user@example.com" autocomplete="off"/>
      </div>

      <div class="field">
        <label>Password *</label>
        <input type="password" id="uPassword" placeholder="Min. 6 characters" oninput="updateStrength()"/>
        <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
        <div class="pw-hint" id="pwHint">Enter a password</div>
      </div>

      <div class="field">
        <label>Role *</label>
        <div class="role-toggle">
          <div class="role-option">
            <input type="radio" name="newRole" id="newRoleUser" value="user" checked/>
            <label for="newRoleUser">
              <span class="role-icon">👤</span>
              <span>
                <span class="role-name">User</span>
                <span class="role-desc">Browse &amp; purchase books</span>
              </span>
            </label>
          </div>
          <div class="role-option">
            <input type="radio" name="newRole" id="newRoleAdmin" value="admin"/>
            <label for="newRoleAdmin">
              <span class="role-icon">🛡️</span>
              <span>
                <span class="role-name">Admin</span>
                <span class="role-desc">Full catalog &amp; order access</span>
              </span>
            </label>
          </div>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitAddUser()">Create Account</button>
    </div>
  </div>

</div><!-- /.container -->

<!-- ── Edit User Modal ── -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="editModalTitle">Edit User</h3>
      <button class="modal-close-btn" onclick="closeEditModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId"/>

      <div class="modal-user-info">
        <div class="modal-avatar" id="editAvatar"></div>
        <div>
          <div class="modal-user-name" id="editAvatarName"></div>
          <div class="modal-user-id"   id="editAvatarId"></div>
        </div>
      </div>

      <div class="modal-field">
        <label>Full Name *</label>
        <input type="text"     id="editName"     placeholder="Full name"/>
      </div>
      <div class="modal-field">
        <label>Email Address *</label>
        <input type="email"    id="editEmail"    placeholder="email@example.com"/>
      </div>
      <div class="modal-field">
        <label>New Password</label>
        <input type="password" id="editPassword" placeholder="Leave blank to keep current"/>
        <span class="hint">Min. 6 characters if changing</span>
      </div>
      <div class="modal-field">
        <label>Role *</label>
        <div class="role-toggle">
          <div class="role-option">
            <input type="radio" name="editRole" id="editRoleUser"  value="user"/>
            <label for="editRoleUser">👤 User</label>
          </div>
          <div class="role-option">
            <input type="radio" name="editRole" id="editRoleAdmin" value="admin"/>
            <label for="editRoleAdmin">🛡️ Admin</label>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="saveUserBtn" onclick="saveUserEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="admin-shared.js"></script>
<script src="admin-users.js"></script>
</body>
</html>
