<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chapter One — Admin: Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
        :root{
          --bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1f1f23;
          --border:rgba(255,255,255,0.08);--accent:#2563eb;--accent-h:#1d4ed8;
          --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
          --danger:#ef4444;--success:#22c55e;--gold:#d4a944;--warn:#f59e0b;
          --font-head:'Lora',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;
          --radius:12px;
        }
        body.light{--bg:#faf7f2;--surface:#fff;--surface2:#f5f0e8;--surface3:#ede8de;--border:rgba(0,0,0,0.09);--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;--gold:#b8860b;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:var(--font-body);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
        .nav{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
        .nav-logo{font-family:var(--font-head);font-size:1.5rem;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-0.02em;}
        .nav-logo sup{font-size:0.55rem;font-family:var(--font-body);letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);vertical-align:super;}
        .nav-right{display:flex;align-items:center;gap:0.6rem;}
        .nav-link{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.4rem 0.85rem;font-size:0.82rem;color:var(--text2);text-decoration:none;transition:all .2s;cursor:pointer;font-family:var(--font-body);}
        .nav-link:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
        .btn-text{background:none;border:none;color:var(--text3);font-size:0.82rem;cursor:pointer;padding:0.4rem 0.6rem;}
        .btn-text:hover{color:var(--text);}
        .admin-badge{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.25);border-radius:9999px;padding:0.25rem 0.65rem;}
        .admin-dropdown{position:relative;display:inline-block;}
        .admin-dropdown-btn{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:0.4rem 0.85rem;font-size:0.82rem;font-family:var(--font-body);cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;transition:all .2s;}
        .admin-dropdown-btn:hover{background:rgba(37,99,235,.25);}
        .admin-dropdown-btn .arrow{font-size:0.65rem;transition:transform .2s;}
        .admin-dropdown.open .admin-dropdown-btn .arrow{transform:rotate(180deg);}
        .admin-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);min-width:190px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.35);}
        .admin-dropdown.open .admin-dropdown-menu{display:block;}
        .admin-dropdown-menu a{display:flex;align-items:center;gap:0.6rem;padding:0.65rem 1rem;font-size:0.83rem;color:var(--text2);text-decoration:none;transition:background .15s;}
        .admin-dropdown-menu a:hover{background:var(--surface3);color:var(--text);}
        .admin-dropdown-menu a.active{color:var(--text);background:var(--surface3);}
        .menu-icon{font-size:1rem;width:20px;text-align:center;}
        .menu-divider{height:1px;background:var(--border);margin:4px 0;}
        .container{max-width:1100px;margin:0 auto;padding:2.5rem 2rem 5rem;}
        .page-head{margin-bottom:1.75rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
        .page-eyebrow{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
        .page-title{font-family:var(--font-head);font-size:2rem;font-weight:700;letter-spacing:-0.02em;}
        .page-sub{font-size:0.88rem;color:var(--text2);margin-top:0.25rem;}
        .stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;}
        .stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.25rem;display:flex;flex-direction:column;gap:0.2rem;min-width:120px;}
        .stat-num{font-family:var(--font-head);font-size:1.5rem;font-weight:700;color:var(--text);}
        .stat-label{font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);}
        .stat-chip.s-admins .stat-num{color:#60a5fa;}
        .stat-chip.s-users .stat-num{color:var(--success);}
        .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.75rem;}
        .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:0.88rem;font-family:var(--font-body);font-weight:500;padding:0.7rem 1.25rem;cursor:pointer;transition:all .2s;margin-bottom:-1px;}
        .tab-btn:hover{color:var(--text2);}
        .tab-btn.active{color:var(--text);border-bottom-color:var(--accent);}
        .tab-panel{display:none;}
        .tab-panel.active{display:block;}
        .toolbar{display:flex;gap:0.7rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem;}
        .search-wrap{flex:1;min-width:200px;position:relative;}
        .search-wrap svg{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--text3);width:15px;height:15px;}
        .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.7rem 1rem 0.7rem 2.5rem;color:var(--text);font-size:0.88rem;font-family:var(--font-body);outline:none;transition:border-color .2s;}
        .search-wrap input:focus{border-color:var(--accent);}
        .search-wrap input::placeholder{color:var(--text3);}
        select.pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.7rem 1rem;color:var(--text);font-size:0.83rem;font-family:var(--font-body);outline:none;cursor:pointer;transition:border-color .2s;}
        select.pill:focus{border-color:var(--accent);}
        select.pill option{background:var(--surface2);}
        .count-tag{font-size:0.78rem;color:var(--text3);margin-left:auto;white-space:nowrap;}
        .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
        table{width:100%;border-collapse:collapse;}
        thead tr{border-bottom:1px solid var(--border);}
        thead th{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:0.85rem 1.1rem;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;transition:color .2s;}
        thead th:hover{color:var(--text2);}
        thead th.sorted{color:var(--accent);}
        thead th.no-sort{cursor:default;}
        thead th.no-sort:hover{color:var(--text3);}
        tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
        tbody tr:last-child{border-bottom:none;}
        tbody tr:hover{background:var(--surface2);}
        td{padding:0.9rem 1.1rem;font-size:0.85rem;vertical-align:middle;}
        .td-id{font-size:0.75rem;color:var(--text3);font-weight:600;}
        .td-name{font-weight:600;color:var(--text);}
        .td-email{color:var(--text2);font-size:0.82rem;}
        .td-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;flex-shrink:0;color:#fff;}
        .role-badge{font-size:0.66rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:0.26rem 0.65rem;border-radius:9999px;white-space:nowrap;}
        .role-admin{background:rgba(37,99,235,.12);color:#60a5fa;border:1px solid rgba(37,99,235,.2);}
        .role-user{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2);}
        .btn-edit-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:0.78rem;padding:0.35rem 0.75rem;cursor:pointer;transition:all .2s;font-family:var(--font-body);}
        .btn-edit-row:hover{border-color:var(--accent);color:var(--accent);}
        .state-row td{text-align:center;padding:5rem 1rem;color:var(--text3);}
        .state-icon{font-size:2.5rem;display:block;margin-bottom:0.75rem;opacity:.6;}
        .pagination{display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:1.5rem;flex-wrap:wrap;}
        .page-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:0.82rem;font-family:var(--font-body);padding:0.4rem 0.75rem;cursor:pointer;transition:all .2s;min-width:36px;}
        .page-btn:hover{border-color:var(--accent);color:var(--text);}
        .page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
        .page-btn:disabled{opacity:0.35;cursor:not-allowed;}
        .page-info{font-size:0.78rem;color:var(--text3);margin:0 0.4rem;}
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;max-width:560px;}
        .field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.25rem;}
        .field label{font-size:0.75rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);}
        .field input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0.68rem 1rem;color:var(--text);font-size:0.87rem;font-family:var(--font-body);outline:none;transition:border-color .2s;width:100%;}
        .field input:focus{border-color:var(--accent);}
        .field input::placeholder{color:var(--text3);}
        .field .hint{font-size:0.72rem;color:var(--text3);}
        .role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
        .role-option{position:relative;}
        .role-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
        .role-option label{display:flex;align-items:center;gap:0.55rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:0.65rem 1rem;font-size:0.84rem;color:var(--text2);cursor:pointer;transition:all .2s;}
        .role-option input:checked + label{border-color:var(--accent);background:rgba(37,99,235,.1);color:var(--text);}
        .role-icon{font-size:1.1rem;}
        .role-name{font-weight:600;}
        .role-desc{font-size:0.72rem;color:var(--text3);display:block;margin-top:1px;}
        .pw-strength{height:3px;border-radius:2px;margin-top:6px;background:var(--surface3);overflow:hidden;}
        .pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;}
        .pw-hint{font-size:0.72rem;color:var(--text3);margin-top:4px;}
        .btn-submit{background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;font-family:var(--font-body);padding:0.82rem 2rem;cursor:pointer;transition:background .2s;margin-top:1.5rem;}
        .btn-submit:hover{background:var(--accent-h);}
        .btn-submit:disabled{opacity:.55;cursor:not-allowed;}
        .success-banner{display:none;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:var(--radius);padding:0.9rem 1.25rem;margin-bottom:1.25rem;font-size:0.85rem;color:#4ade80;align-items:center;gap:0.6rem;max-width:560px;}
        .success-banner.show{display:flex;}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:1rem;}
        .modal-overlay.open{display:flex;}
        .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5);}
        .modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
        .modal-head h3{font-family:var(--font-head);font-size:1.15rem;font-weight:700;}
        .modal-close-btn{background:none;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;padding:0.2rem 0.4rem;border-radius:6px;transition:all .2s;}
        .modal-close-btn:hover{background:var(--surface2);color:var(--text);}
        .modal-body{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
        .modal-user-info{display:flex;align-items:center;gap:0.85rem;padding:0.85rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
        .modal-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;color:#fff;}
        .modal-user-name{font-weight:600;font-size:0.9rem;}
        .modal-user-id{font-size:0.72rem;color:var(--text3);}
        .modal-field{display:flex;flex-direction:column;gap:0.4rem;}
        .modal-field label{font-size:0.75rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);}
        .modal-field input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0.65rem 1rem;color:var(--text);font-size:0.87rem;font-family:var(--font-body);outline:none;transition:border-color .2s;}
        .modal-field input:focus{border-color:var(--accent);}
        .modal-field input::placeholder{color:var(--text3);}
        .modal-field .hint{font-size:0.72rem;color:var(--text3);}
        .modal-foot{display:flex;gap:0.75rem;padding:1.25rem 1.5rem;border-top:1px solid var(--border);justify-content:flex-end;}
        .btn-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text2);font-size:0.85rem;font-family:var(--font-body);padding:0.6rem 1.25rem;cursor:pointer;transition:all .2s;}
        .btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
        .btn-save{background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:0.85rem;font-weight:600;font-family:var(--font-body);padding:0.6rem 1.5rem;cursor:pointer;transition:background .2s;}
        .btn-save:hover{background:var(--accent-h);}
        .btn-save:disabled{opacity:.55;cursor:not-allowed;}
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;min-width:220px;max-width:320px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.8rem 1.1rem;border-radius:var(--radius);font-size:0.84rem;z-index:999;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
        .toast.show{opacity:1;transform:translateY(0);}
        .toast.success{border-left:3px solid var(--success);}
        .toast.error{border-left:3px solid var(--danger);}
        @media(max-width:700px){
          .container{padding:1.5rem 1rem 3rem;}
          thead th:nth-child(1),td:nth-child(1){display:none;}
          .stats-bar{gap:0.5rem;}
          .form-card{padding:1.25rem;}
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="/index.html" class="nav-logo">Chapter<sup>One</sup></a>
    <div class="nav-right">
        <span class="admin-badge">Admin</span>
        <div class="admin-dropdown" id="adminDropdown">
            <button class="admin-dropdown-btn" onclick="toggleAdminDropdown()">
                ⚙️ Admin Tools <span class="arrow">▾</span>
            </button>
            <div class="admin-dropdown-menu">
                <a href="/index.html"><span class="menu-icon">📚</span>Manage Catalog</a>
                <a href="/admin-orders.html"><span class="menu-icon">📋</span>Manage Orders</a>
                <div class="menu-divider"></div>
                <a href="/admin-users.html" class="active"><span class="menu-icon">👥</span>User Management</a>
            </div>
        </div>
        <button class="btn-text" onclick="logout()">Sign out</button>
        <button class="nav-link" id="themeBtn" onclick="toggleTheme()" style="font-size:.9rem;padding:.4rem .6rem">🌓</button>
    </div>
</nav>

<div class="container">
    <div class="page-head">
        <div>
            <div class="page-eyebrow">Admin Panel</div>
            <div class="page-title">User Management</div>
            <div class="page-sub">View, edit, and create user accounts</div>
        </div>
        <button class="nav-link" onclick="loadUsers()">↻ Refresh</button>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-dashboard" onclick="switchTab('dashboard')">👥 All Users</button>
        <button class="tab-btn"        id="tab-add"       onclick="switchTab('add')">+ Add User</button>
    </div>

    <!-- ALL USERS TAB -->
    <div class="tab-panel active" id="panel-dashboard">
        <div class="toolbar">
            <div class="search-wrap">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clip-rule="evenodd"/></svg>
                <input type="text" id="searchInput" placeholder="Search by name, email, or ID…" oninput="resetAndRender()"/>
            </div>
            <select class="pill" id="roleFilter" onchange="resetAndRender()">
                <option value="">All Roles</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
            </select>
            <span class="count-tag" id="countTag"></span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th onclick="setSort('id')"    id="th-id">   ID <span id="si-id"></span></th>
                    <th class="no-sort" style="width:36px"></th>
                    <th onclick="setSort('name')"  id="th-name"> Name <span id="si-name"></span></th>
                    <th onclick="setSort('email')" id="th-email">Email <span id="si-email"></span></th>
                    <th class="no-sort">Role</th>
                    <th class="no-sort"></th>
                </tr>
                </thead>
                <tbody id="tableBody">
                <tr class="state-row"><td colspan="6"><span class="state-icon">⏳</span>Loading users…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- ADD USER TAB -->
    <div class="tab-panel" id="panel-add">
        <div class="success-banner" id="successBanner">✅ <span id="successMsg"></span></div>
        <div class="form-card">
            <div class="field">
                <label>Full Name *</label>
                <input type="text" id="uName" placeholder="e.g. Juan dela Cruz" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Email Address *</label>
                <input type="email" id="uEmail" placeholder="user@example.com" autocomplete="off"/>
            </div>
            <div class="field">
                <label>Password *</label>
                <input type="password" id="uPassword" placeholder="Min. 6 characters" oninput="updateStrength()"/>
                <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
                <div class="pw-hint" id="pwHint">Enter a password</div>
            </div>
            <div class="field">
                <label>Role *</label>
                <div class="role-toggle">
                    <div class="role-option">
                        <input type="radio" name="newRole" id="newRoleUser" value="user" checked/>
                        <label for="newRoleUser">
                            <span class="role-icon">👤</span>
                            <span><span class="role-name">User</span><span class="role-desc">Browse &amp; purchase books</span></span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="newRole" id="newRoleAdmin" value="admin"/>
                        <label for="newRoleAdmin">
                            <span class="role-icon">🛡️</span>
                            <span><span class="role-name">Admin</span><span class="role-desc">Full catalog &amp; order access</span></span>
                        </label>
                    </div>
                </div>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitAddUser()">Create Account</button>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal-card">
        <div class="modal-head">
            <h3>Edit User</h3>
            <button class="modal-close-btn" onclick="closeEditModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editUserId"/>
            <div class="modal-user-info">
                <div class="modal-avatar" id="editAvatar"></div>
                <div>
                    <div class="modal-user-name" id="editAvatarName"></div>
                    <div class="modal-user-id"   id="editAvatarId"></div>
                </div>
            </div>
            <div class="modal-field">
                <label>Full Name *</label>
                <input type="text"     id="editName"     placeholder="Full name"/>
            </div>
            <div class="modal-field">
                <label>Email Address *</label>
                <input type="email"    id="editEmail"    placeholder="email@example.com"/>
            </div>
            <div class="modal-field">
                <label>New Password</label>
                <input type="password" id="editPassword" placeholder="Leave blank to keep current"/>
                <span class="hint">Min. 6 characters if changing</span>
            </div>
            <div class="modal-field">
                <label>Role *</label>
                <div class="role-toggle">
                    <div class="role-option">
                        <input type="radio" name="editRole" id="editRoleUser"  value="user"/>
                        <label for="editRoleUser">👤 User</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="editRole" id="editRoleAdmin" value="admin"/>
                        <label for="editRoleAdmin">🛡️ Admin</label>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-save" id="saveUserBtn" onclick="saveUserEdit()">Save Changes</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    'use strict';
    const PAGE_SIZE=10;
    let currentPage=1,allUsers=[],sortKey='id',sortAsc=true;

    function getUser(){try{return JSON.parse(localStorage.getItem('user'));}catch{return null;}}
    function logout(){localStorage.removeItem('user');localStorage.removeItem('cart');window.location.href='/login.html';}
    (function(){const u=getUser();if(!u||!u.admin)window.location.href='/index.html';})();

    function initTheme(){if(localStorage.getItem('theme')==='light')document.body.classList.add('light');updateThemeBtn();}
    function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');updateThemeBtn();}
    function updateThemeBtn(){const b=document.getElementById('themeBtn');if(b)b.textContent=document.body.classList.contains('light')?'🌙':'🌓';}

    function toggleAdminDropdown(){document.getElementById('adminDropdown').classList.toggle('open');}
    document.addEventListener('click',e=>{const dd=document.getElementById('adminDropdown');if(dd&&!dd.contains(e.target))dd.classList.remove('open');});

    function switchTab(tab){
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById('tab-'+tab).classList.add('active');
      document.getElementById('panel-'+tab).classList.add('active');
    }

    const avatarColors=['#1e3a5f','#2d1b4e','#0f3460','#3d2314','#0d2137','#3d1a2d','#1a3a2d','#1a1a2e'];
    function avatarColor(n){return avatarColors[(n?.charCodeAt(0)||65)%avatarColors.length];}
    function avatarInitial(n){return(n||'?')[0].toUpperCase();}

    async function loadUsers(){
      const tbody=document.getElementById('tableBody');
      tbody.innerHTML='<tr class="state-row"><td colspan="6"><span class="state-icon">⏳</span>Loading users…</td></tr>';
      try{
        const res=await fetch('/api/auth/users',{headers:{'X-User-Admin':'true'}});
        if(!res.ok)throw new Error();
        allUsers=await res.json();
        buildStats();renderTable();
      }catch{
        tbody.innerHTML='<tr class="state-row"><td colspan="6"><span class="state-icon">⚠️</span>Could not load users.</td></tr>';
      }
    }

    function buildStats(){
      const total=allUsers.length,admins=allUsers.filter(u=>u.admin).length;
      document.getElementById('statsBar').innerHTML=`
        <div class="stat-chip"><span class="stat-num">${total}</span><span class="stat-label">Total Users</span></div>
        <div class="stat-chip s-admins"><span class="stat-num">${admins}</span><span class="stat-label">Admins</span></div>
        <div class="stat-chip s-users"><span class="stat-num">${total-admins}</span><span class="stat-label">Regular Users</span></div>`;
    }

    function setSort(key){if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=true;}currentPage=1;renderTable();}
    function updateSortIndicators(){
      ['id','name','email'].forEach(k=>{
        const th=document.getElementById('th-'+k),si=document.getElementById('si-'+k);
        if(!th||!si)return;
        th.classList.toggle('sorted',sortKey===k);
        si.textContent=sortKey===k?(sortAsc?' ↑':' ↓'):'';
      });
    }

    function resetAndRender(){currentPage=1;renderTable();}

    function renderTable(){
      const kw=document.getElementById('searchInput').value.toLowerCase().trim();
      const role=document.getElementById('roleFilter').value;
      let list=allUsers.filter(u=>{
        const mk=!kw||u.name?.toLowerCase().includes(kw)||u.email?.toLowerCase().includes(kw)||String(u.id).includes(kw);
        const mr=!role||(role==='admin'?u.admin:!u.admin);
        return mk&&mr;
      });
      list.sort((a,b)=>{
        let av=a[sortKey]??'',bv=b[sortKey]??'';
        if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
        return av<bv?(sortAsc?-1:1):av>bv?(sortAsc?1:-1):0;
      });
      updateSortIndicators();
      const total=list.length,totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
      if(currentPage>totalPages)currentPage=totalPages;
      const page=list.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
      document.getElementById('countTag').textContent=`${total} user${total!==1?'s':''} · page ${currentPage} of ${totalPages}`;
      const tbody=document.getElementById('tableBody');
      if(!total){
        tbody.innerHTML='<tr class="state-row"><td colspan="6"><span class="state-icon">🔍</span>No users match your filter.</td></tr>';
        document.getElementById('pagination').innerHTML='';return;
      }
      const me=getUser()?.id;
      tbody.innerHTML=page.map(u=>`
        <tr>
          <td class="td-id">#${u.id}</td>
          <td style="width:36px;padding-right:0"><div class="td-avatar" style="background:${avatarColor(u.name)}">${avatarInitial(u.name)}</div></td>
          <td class="td-name">${u.name||'—'}${u.id===me?'<span style="font-size:0.68rem;color:var(--accent);margin-left:4px">(you)</span>':''}</td>
          <td class="td-email">${u.email||'—'}</td>
          <td><span class="role-badge ${u.admin?'role-admin':'role-user'}">${u.admin?'Admin':'User'}</span></td>
          <td style="text-align:right"><button class="btn-edit-row" onclick="openEditModal(${u.id})">✏️ Edit</button></td>
        </tr>`).join('');
      renderPagination(totalPages);
    }

    function renderPagination(totalPages){
      const el=document.getElementById('pagination');
      if(totalPages<=1){el.innerHTML='';return;}
      const r=2,s=Math.max(1,currentPage-r),e=Math.min(totalPages,currentPage+r);
      let h=`<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
      if(s>1){h+=`<button class="page-btn" onclick="goToPage(1)">1</button>`;if(s>2)h+=`<span class="page-info">…</span>`;}
      for(let i=s;i<=e;i++)h+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
      if(e<totalPages){if(e<totalPages-1)h+=`<span class="page-info">…</span>`;h+=`<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;}
      h+=`<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
      el.innerHTML=h;
    }
    function goToPage(p){currentPage=p;renderTable();window.scrollTo({top:0,behavior:'smooth'});}

    function openEditModal(userId){
      const u=allUsers.find(x=>x.id===userId);if(!u)return;
      document.getElementById('editUserId').value=u.id;
      document.getElementById('editName').value=u.name||'';
      document.getElementById('editEmail').value=u.email||'';
      document.getElementById('editPassword').value='';
      document.getElementById(u.admin?'editRoleAdmin':'editRoleUser').checked=true;
      const av=document.getElementById('editAvatar');
      av.style.background=avatarColor(u.name);av.textContent=avatarInitial(u.name);
      document.getElementById('editAvatarName').textContent=u.name;
      document.getElementById('editAvatarId').textContent='User #'+u.id;
      const modal=document.getElementById('editModal');
      modal.classList.add('open');modal.style.display='flex';
      document.body.style.overflow='hidden';
    }
    function closeEditModal(){
      const modal=document.getElementById('editModal');
      modal.classList.remove('open');modal.style.display='none';
      document.body.style.overflow='';
    }
    document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeEditModal();});

    async function saveUserEdit(){
      const id=parseInt(document.getElementById('editUserId').value);
      const name=document.getElementById('editName').value.trim();
      const email=document.getElementById('editEmail').value.trim();
      const password=document.getElementById('editPassword').value;
      const isAdmin=document.querySelector('input[name="editRole"]:checked').value==='admin';
      if(!name){toast('Name is required','error');return;}
      if(!email){toast('Email is required','error');return;}
      if(password&&password.length<6){toast('Password must be at least 6 characters','error');return;}
      const btn=document.getElementById('saveUserBtn');
      btn.disabled=true;btn.textContent='Saving…';
      const body={name,email,admin:isAdmin};
      if(password)body.password=password;
      try{
        const res=await fetch('/api/auth/users/'+id,{method:'PUT',headers:{'Content-Type':'application/json','X-User-Admin':'true'},body:JSON.stringify(body)});
        const data=await res.json();
        if(!res.ok){toast(data.message||'Update failed','error');return;}
        const idx=allUsers.findIndex(x=>x.id===id);if(idx>=0)allUsers[idx]=data;
        const me=getUser();
        if(me&&me.id===id){me.name=data.name;me.email=data.email;me.admin=data.admin;localStorage.setItem('user',JSON.stringify(me));}
        buildStats();renderTable();closeEditModal();
        toast(data.name+' updated successfully','success');
      }catch{toast('Network error','error');}
      finally{btn.disabled=false;btn.textContent='Save Changes';}
    }

    function updateStrength(){
      const pw=document.getElementById('uPassword').value;
      const bar=document.getElementById('pwBar'),hint=document.getElementById('pwHint');
      let s=0;
      if(pw.length>=6)s++;if(pw.length>=10)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
      const levels=[{w:'0%',bg:'transparent',t:'Enter a password'},{w:'25%',bg:'#ef4444',t:'Too short'},{w:'50%',bg:'#f59e0b',t:'Weak'},{w:'70%',bg:'#eab308',t:'Fair'},{w:'85%',bg:'#84cc16',t:'Good'},{w:'100%',bg:'#22c55e',t:'Strong'}];
      const l=pw.length===0?0:Math.max(1,Math.min(s,5));
      bar.style.width=levels[l].w;bar.style.background=levels[l].bg;hint.textContent=levels[l].t;
    }

    async function submitAddUser(){
      const name=document.getElementById('uName').value.trim();
      const email=document.getElementById('uEmail').value.trim();
      const password=document.getElementById('uPassword').value;
      const isAdmin=document.querySelector('input[name="newRole"]:checked').value==='admin';
      if(!name){toast('Name is required','error');return;}
      if(!email){toast('Email is required','error');return;}
      if(password.length<6){toast('Password must be at least 6 characters','error');return;}
      const btn=document.getElementById('submitBtn');
      btn.disabled=true;btn.textContent='Creating…';
      try{
        const res=await fetch('/api/auth/admin/create-user',{method:'POST',headers:{'Content-Type':'application/json','X-User-Admin':'true'},body:JSON.stringify({name,email,password,admin:isAdmin})});
        const data=await res.json();
        if(!res.ok){toast(data.message||'Failed to create user','error');return;}
        const banner=document.getElementById('successBanner');
        document.getElementById('successMsg').textContent='Account created for '+data.name+' ('+(isAdmin?'Admin':'User')+')';
        banner.classList.add('show');setTimeout(()=>banner.classList.remove('show'),5000);
        document.getElementById('uName').value='';
        document.getElementById('uEmail').value='';
        document.getElementById('uPassword').value='';
        document.getElementById('newRoleUser').checked=true;
        updateStrength();
        await loadUsers();
        switchTab('dashboard');
        toast(data.name+' added successfully','success');
      }catch{toast('Network error','error');}
      finally{btn.disabled=false;btn.textContent='Create Account';}
    }

    let toastTimer;
    function toast(msg,type=''){
      clearTimeout(toastTimer);
      const el=document.getElementById('toast');
      el.textContent=msg;el.className='toast '+type+' show';
      toastTimer=setTimeout(()=>el.className='toast',3500);
    }

    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEditModal();});
    initTheme();
    loadUsers();
</script>
</body>
</html>
