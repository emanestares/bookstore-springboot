<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #05080f;
      --surface: #0d1321;
      --surface2: #131c2e;
      --border: rgba(255,255,255,0.07);
      --accent: #2563eb;
      --accent-h: #1d4ed8;
      --text: #f1f5f9;
      --muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body.light-mode {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background 0.3s, color 0.3s;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
    .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;margin:1.5rem;animation:rise 0.4s ease both;}
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .brand{text-align:center;margin-bottom:2rem;}
    .brand-dot{width:40px;height:40px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin:0 auto 0.75rem;}
    .brand h1{font-size:1.1rem;font-weight:700;letter-spacing:0.06em;color:var(--text);}
    .brand p{font-size:0.8rem;color:var(--muted);margin-top:0.25rem;}
    .field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
    .field label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
    .field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--accent);}
    .field input::placeholder{color:var(--muted);}
    .alert{padding:0.65rem 0.9rem;border-radius:8px;font-size:0.82rem;margin-bottom:1rem;display:none;}
    .alert.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--danger);}
    .alert.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:var(--success);}
    .alert.show{display:block;}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.8rem;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
    .btn:hover{background:var(--accent-h);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .footer-link{text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--muted);}
    .footer-link a{color:var(--accent);text-decoration:none;}

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 1000;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
  🌓 <span>Theme</span>
</button>

<div class="card">
  <div class="brand">
    <div class="brand-dot">📚</div>
    <h1>NOVA</h1>
    <p>Create your account</p>
  </div>

  <div class="alert" id="alert"></div>

  <div class="field">
    <label>Name</label>
    <input type="text" id="name" placeholder="Juan Dela Cruz"/>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@email.com"/>
  </div>
  <div class="field">
    <label>Password <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(min. 8 characters)</span></label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="signupBtn" onclick="doSignup()">Create Account</button>

  <p class="footer-link">Already have an account? <a href="/login.html">Sign in</a></p>
</div>

<script>
  function toggleTheme() {
    const body = document.body;
    body.classList.toggle("light-mode");
    const isLight = body.classList.contains("light-mode");
    localStorage.setItem("theme", isLight ? "light" : "dark");
    const btn = document.getElementById("themeToggle");
    if (btn) btn.innerHTML = isLight ? "☀️ <span>Light</span>" : "🌓 <span>Theme</span>";
  }

  function initTheme() {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
      document.body.classList.add("light-mode");
      const btn = document.getElementById("themeToggle");
      if(btn) btn.innerHTML = "☀️ <span>Light</span>";
    }
  }

  async function doSignup() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signupBtn');

    if (!name || !email || !password) { showAlert('All fields are required.', 'error'); return; }
    if (password.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (!res.ok) { showAlert(data.message || data.error || 'Registration failed.', 'error'); return; }

      showAlert('Account created! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = '/login.html', 1500);
    } catch(e) {
      showAlert('Cannot connect to server. Is it running?', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => {
      if (el.className.includes('show')) el.className = 'alert';
    }, 3000);
  }

  initTheme();
</script>
</body>
</html>
