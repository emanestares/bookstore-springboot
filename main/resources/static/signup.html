<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NOVA | Sign Up</title>
    <!-- Font Awesome 6 (matching main bookstore) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Inter (same as main design) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* minimalist geometric background pattern (same as login) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* main card - modern, clean, matches login page */
        .signup-card {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 42px 38px;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* logo area - identical to login */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #e95e2e, #f97316);
            width: 56px;
            height: 56px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 18px rgba(249,115,22,0.2);
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .logo-area h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e293b, #334155);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            color: #0f172a;
            letter-spacing: -0.3px;
        }

        /* input groups - modern, with icons */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            transition: all 0.2s ease;
            color: #0f172a;
            font-weight: 500;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* password hint */
        .password-hint {
            font-size: 0.7rem;
            color: #8b9ab0;
            margin-top: 6px;
            margin-left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* button - matches main bookstore */
        .btn-signup {
            width: 100%;
            padding: 14px 0;
            background: #0f172a;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }

        .btn-signup:hover {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(249,115,22,0.4);
        }

        .btn-signup:active {
            transform: translateY(1px);
        }

        /* message area */
        .message {
            text-align: center;
            margin-top: 18px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 40px;
            display: none;
        }

        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            display: block;
            border-left: 3px solid #16a34a;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            display: block;
            border-left: 3px solid #dc2626;
        }

        .extra {
            margin-top: 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #5b6e8c;
            border-top: 1px solid #edf2f7;
            padding-top: 24px;
        }

        .extra a {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .extra a:hover {
            color: #ea580c;
            text-decoration: underline;
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #8b9ab0;
            z-index: 1;
            background: transparent;
            letter-spacing: 0.3px;
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 32px 24px;
                max-width: 92%;
            }
            .logo-icon {
                width: 48px;
                height: 48px;
            }
            .logo-icon i {
                font-size: 24px;
            }
            .btn-signup {
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

<div class="signup-card">
    <div class="logo-area">
        <div class="logo-icon">
            <i class="fas fa-book-open"></i>
        </div>
        <h1>novabooks</h1>
        <p>join the minimalist reading community</p>
    </div>

    <h2>create account</h2>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="name" placeholder="Full name" autocomplete="name">
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="new-password">
    </div>
    <div class="password-hint">
        <i class="fas fa-info-circle" style="font-size: 10px;"></i>
        <span>min. 6 characters</span>
    </div>

    <button class="btn-signup" onclick="register()">
        <i class="fas fa-user-plus"></i> Sign up
    </button>

    <div id="message" class="message"></div>

    <div class="extra">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<footer>
    © 2026 novabooks — clean & minimal
</footer>

<script>
    async function register() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const messageDiv = document.getElementById("message");

        // Reset message
        messageDiv.className = "message";
        messageDiv.style.display = "none";
        messageDiv.innerText = "";

        // Validation
        if (!name) {
            showMessage("Please enter your full name", "error");
            return;
        }

        if (!email) {
            showMessage("Email address is required", "error");
            return;
        }

        if (!email.includes('@') || !email.includes('.')) {
            showMessage("Please enter a valid email address", "error");
            return;
        }

        if (!password) {
            showMessage("Password is required", "error");
            return;
        }

        if (password.length < 6) {
            showMessage("Password must be at least 6 characters", "error");
            return;
        }

        // Show loading state on button
        const signupBtn = document.querySelector(".btn-signup");
        const originalBtnText = signupBtn.innerHTML;
        signupBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating account...';
        signupBtn.disabled = true;

        try {
            const response = await fetch("http://localhost:8080/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    password: password,
                    is_admin: false  // default non-admin user
                })
            });

            if (!response.ok) {
                let errorMsg = "Registration failed";
                try {
                    const errorData = await response.json();
                    if (errorData.message) errorMsg = errorData.message;
                    if (errorData.error) errorMsg = errorData.error;
                } catch (e) {
                    // fallback
                }
                throw new Error(errorMsg);
            }

            const userData = await response.json();

            // Show success message
            showMessage("✨ Account created successfully! Redirecting to login...", "success");

            // Redirect to login after short delay
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);

        } catch (error) {
            console.error("Registration error:", error);
            showMessage(`❌ ${error.message || "Registration failed. Please try again."}`, "error");
            signupBtn.innerHTML = originalBtnText;
            signupBtn.disabled = false;
        }
    }

    function showMessage(msg, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerText = msg;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = "block";
    }

    // Allow Enter key to submit
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                register();
            }
        });
    });
</script>
</body>
</html>
