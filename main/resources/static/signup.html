<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>International Bookstore — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090b;--surface:#111113;--surface2:#18181b;--border:rgba(255,255,255,0.08);--accent:#2563eb;--accent-h:#1d4ed8;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--danger:#ef4444;--success:#22c55e;}
body.light{--bg:#faf7f2;--surface:#fff;--surface2:#f5f0e8;--border:rgba(0,0,0,0.09);--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1e3a5f,#2563eb,#2d1b4e,#3d2314,#0f3460);z-index:10;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2.25rem;width:100%;max-width:400px;margin:1.5rem;animation:rise .4s ease both;position:relative;z-index:1;}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:2rem;}
.brand-icon{font-family:'Lora',serif;font-size:2rem;font-weight:700;color:var(--text);letter-spacing:-0.03em;}
.brand-icon sup{font-size:0.6rem;font-family:'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);vertical-align:super;}
.brand-sub{font-size:0.82rem;color:var(--text2);margin-top:0.25rem;}
.divider{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;}
.divider span{font-size:0.75rem;color:var(--text3);white-space:nowrap;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.field label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text2);}
.field label span{text-transform:none;font-weight:400;letter-spacing:0;color:var(--text3);}
.field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.72rem 1rem;color:var(--text);font-size:0.9rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text3);}
.alert{padding:0.65rem 0.9rem;border-radius:8px;font-size:0.82rem;margin-bottom:1rem;display:none;}
.alert.error  {background:rgba(239,68,68,0.1);border-left:3px solid var(--danger);color:var(--danger);}
.alert.success{background:rgba(34,197,94,0.1);border-left:3px solid var(--success);color:var(--success);}
.alert.show{display:block;}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.82rem;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;margin-top:0.5rem;}
.btn:hover{background:var(--accent-h);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.footer-txt{text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text2);}
.footer-txt a{color:var(--accent);text-decoration:none;}
.footer-txt a:hover{text-decoration:underline;}
.theme-row{position:fixed;top:0.75rem;right:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.3rem 0.6rem;font-size:0.85rem;cursor:pointer;color:var(--text2);z-index:20;}
</style>
</head>
<body>
<button class="theme-row" id="themeBtn" onclick="toggleTheme()">🌓</button>

<div class="card">
  <div class="brand">
    <div class="brand-icon">International<sup>Bookstore</sup></div>
    <div class="brand-sub">Create your reader account</div>
  </div>

  <div class="divider"><span>Join the community</span></div>

  <div class="alert" id="alert"></div>

  <div class="field">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Juan Dela Cruz"/>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@email.com"/>
  </div>
  <div class="field">
    <label>Password <span>(min. 6 characters)</span></label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="signupBtn" onclick="doSignup()">Create Account</button>

  <p class="footer-txt">Already a member? <a href="/login.html">Sign in</a></p>
</div>

<script>
function initTheme(){
  if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
  document.getElementById('themeBtn').textContent = document.body.classList.contains('light')?'🌙':'🌓';
}
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark');
  document.getElementById('themeBtn').textContent = document.body.classList.contains('light')?'🌙':'🌓';
}
initTheme();

async function doSignup(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('signupBtn');
  showAlert('','');

  if(!name||!email||!password){ showAlert('All fields are required.','error'); return; }
  if(password.length<6){ showAlert('Password must be at least 6 characters.','error'); return; }

  btn.disabled=true; btn.textContent='Creating account…';
  try{
    const res  = await fetch('/api/auth/register',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,email,password}) });
    const data = await res.json();
    if(!res.ok){ showAlert(data.message||'Registration failed.','error'); return; }
    showAlert('Account created! Redirecting to login…','success');
    setTimeout(()=>window.location.href='/login.html',1500);
  } catch{ showAlert('Cannot reach server. Is it running?','error'); }
  finally{ btn.disabled=false; btn.textContent='Create Account'; }
}

function showAlert(msg,type){
  const el=document.getElementById('alert');
  el.textContent=msg;
  el.className=type?`alert ${type} show`:'alert';
}
</script>
</body>
</html>
