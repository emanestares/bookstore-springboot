<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chapter One — My Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1f1f23;--border:rgba(255,255,255,0.08);--accent:#2563eb;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--danger:#ef4444;--success:#22c55e;--gold:#d4a944;}
body.light{--bg:#faf7f2;--surface:#fff;--surface2:#f5f0e8;--surface3:#ede8de;--border:rgba(0,0,0,0.09);--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;--gold:#b8860b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.nav{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.nav-logo{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-0.02em;}
.nav-logo sup{font-size:0.55rem;font-family:'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);vertical-align:super;}
.nav-right{display:flex;align-items:center;gap:0.6rem;}
.nav-link{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.4rem 0.85rem;font-size:0.82rem;color:var(--text2);text-decoration:none;transition:all .2s;}
.nav-link:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
.btn-text{background:none;border:none;color:var(--text3);font-size:0.82rem;cursor:pointer;padding:0.4rem 0.6rem;}
.btn-text:hover{color:var(--text);}
.theme-btn{font-size:0.9rem;padding:0.4rem 0.6rem;}

.container{max-width:800px;margin:0 auto;padding:2.5rem 2rem 4rem;}
.page-head{margin-bottom:2.5rem;}
.page-eyebrow{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;}
.page-title{font-family:'Lora',serif;font-size:1.9rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
.page-sub{font-size:0.88rem;color:var(--text2);margin-top:0.3rem;}

.order-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.1rem;transition:border-color .2s;}
.order-card:hover{border-color:rgba(255,255,255,.12);}
body.light .order-card:hover{border-color:rgba(0,0,0,.12);}
.order-head{padding:1.1rem 1.4rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid var(--border);}
.order-meta{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
.order-id{font-size:0.88rem;font-weight:600;color:var(--text);}
.order-date{font-size:0.75rem;color:var(--text3);}
.order-right{display:flex;align-items:center;gap:0.75rem;}
.status-pill{font-size:0.68rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:0.28rem 0.7rem;border-radius:9999px;}
.s-PREPARING {background:rgba(234,179,8,.12);color:#facc15;border:1px solid rgba(234,179,8,.2);}
.s-TO_DELIVER{background:rgba(37,99,235,.12);color:#60a5fa;border:1px solid rgba(37,99,235,.2);}
.s-DECLINED  {background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.order-total{font-family:'Lora',serif;font-size:1.05rem;font-weight:700;color:var(--text);}

.order-items{padding:0.5rem 1.4rem 1rem;}
.oi-row{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.84rem;}
.oi-row:last-child{border-bottom:none;}
.oi-left{display:flex;align-items:center;gap:0.6rem;}
.oi-spine{width:8px;height:28px;border-radius:2px;flex-shrink:0;}
.oi-name{color:var(--text);font-family:'Lora',serif;}
.oi-qty{color:var(--text3);font-family:'Inter',sans-serif;font-size:0.78rem;}
.oi-sub{color:var(--text2);font-size:0.8rem;}

.empty-state{text-align:center;padding:6rem 1rem;}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.6;}
.empty-title{font-family:'Lora',serif;font-size:1.3rem;color:var(--text);margin-bottom:0.5rem;}
.empty-sub{font-size:0.88rem;color:var(--text2);margin-bottom:1.5rem;}
.btn-shop{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.72rem 1.5rem;font-size:0.88rem;font-weight:500;text-decoration:none;cursor:pointer;}
.btn-shop:hover{background:#1d4ed8;}
.loading{text-align:center;padding:5rem;color:var(--text3);font-size:0.9rem;}
.spine-colors{display:none;}
</style>
<link rel="icon" type="image/png" href="icon.png" />
</head>
<body>

<nav class="nav">
  <a href="/index.html" class="nav-logo">Chapter<sup>One</sup></a>
  <div class="nav-right">
    <a href="/index.html" class="nav-link">← Browse</a>
    <button class="btn-text" onclick="logout()">Sign out</button>
    <button class="nav-link theme-btn" id="themeBtn" onclick="toggleTheme()">🌓</button>
  </div>
</nav>

<div class="container">
  <div class="page-head">
    <div class="page-eyebrow">Account</div>
    <div class="page-title">My Orders</div>
    <div class="page-sub">Your complete purchase history</div>
  </div>
  <div id="orderList"><div class="loading">Loading your orders…</div></div>
</div>

<script>
const spineColors=['#1e3a5f','#2d1b4e','#0f3460','#3d2314','#0d2137','#3d1a2d','#1a3a2d','#1a1a2e'];

function getUser(){ try{ return JSON.parse(localStorage.getItem('user')); }catch{ return null; } }
function logout(){ localStorage.removeItem('user'); localStorage.removeItem('cart'); window.location.href='/login.html'; }

function initTheme(){
  if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
  updateThemeBtn();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark');
  updateThemeBtn();
}
function updateThemeBtn(){
  const b=document.getElementById('themeBtn');
  if(b) b.textContent=document.body.classList.contains('light')?'🌙':'🌓';
}
initTheme();

function formatDate(d){
  if(!d) return '';
  return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function spineColor(title){
  return spineColors[(title?.charCodeAt(0)||0) % spineColors.length];
}
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

async function loadOrders(){
  const user = getUser();
  if(!user){ window.location.href='/login.html'; return; }

  const el = document.getElementById('orderList');
  try{
    const res    = await fetch(`/api/orders?userId=${user.id}`);
    const orders = await res.json();

    if(!res.ok || !Array.isArray(orders) || !orders.length){
      el.innerHTML=`
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-title">No orders yet</div>
          <div class="empty-sub">Your order history will appear here once you make a purchase.</div>
          <a href="/index.html" class="btn-shop">Browse the Catalog</a>
        </div>`;
      return;
    }

    el.innerHTML = orders.map(o=>`
      <div class="order-card">
        <div class="order-head">
          <div class="order-meta">
            <span class="order-id">Order #${o.id}</span>
            <span class="order-date">${formatDate(o.orderDate)}</span>
          </div>
          <div class="order-right">
            <span class="status-pill s-${o.status||'CONFIRMED'}">${o.status||'CONFIRMED'}</span>
            <span class="order-total">₱${Number(o.totalAmount||0).toFixed(2)}</span>
          </div>
        </div>
        <div class="order-items">
          ${(o.items||[]).map(i=>`
            <div class="oi-row">
              <div class="oi-left">
                <div class="oi-spine" style="background:${spineColor(i.bookTitle)}"></div>
                <span class="oi-name">${esc(i.bookTitle||'Book')}</span>
                <span class="oi-qty">× ${i.quantity}</span>
              </div>
              <span class="oi-sub">₱${(Number(i.priceAtPurchase||0)*i.quantity).toFixed(2)}</span>
            </div>`).join('')}
        </div>
      </div>`).join('');
  } catch(e){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load orders</div><div class="empty-sub">Please check your connection and try again.</div></div>`;
  }
}

loadOrders();
</script>
</body>
</html>
