<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NOVA | Login</title>
    <!-- Font Awesome 6 (matching main bookstore) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Inter (same as main design) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* minimalist geometric background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* main card - modern, clean, with subtle border */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 40px 36px;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(0px);
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* logo area */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #e95e2e, #f97316);
            width: 56px;
            height: 56px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 18px rgba(249,115,22,0.2);
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .logo-area h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e293b, #334155);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            color: #0f172a;
            letter-spacing: -0.3px;
        }

        /* input groups - minimalist but modern */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            transition: all 0.2s ease;
            color: #0f172a;
            font-weight: 500;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* button - matches main bookstore gradient */
        .btn-login {
            width: 100%;
            padding: 14px 0;
            background: #0f172a;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(249,115,22,0.4);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        /* message area */
        .message {
            text-align: center;
            margin-top: 18px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 40px;
            background: #fef9f0;
            color: #e85d04;
            display: inline-block;
            width: 100%;
        }

        .extra {
            margin-top: 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #5b6e8c;
            border-top: 1px solid #edf2f7;
            padding-top: 24px;
        }

        .extra a {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .extra a:hover {
            color: #ea580c;
            text-decoration: underline;
        }

        /* demo credentials hint - minimalist helper */
        .demo-hint {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 24px;
            font-size: 0.7rem;
            text-align: center;
            color: #5b6e8c;
            border: 1px solid #ecf3fa;
        }

        .demo-hint span {
            font-family: monospace;
            background: #eef2ff;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #f97316;
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #8b9ab0;
            z-index: 1;
            background: transparent;
            letter-spacing: 0.3px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                max-width: 92%;
            }
            .logo-icon {
                width: 48px;
                height: 48px;
            }
            .logo-icon i {
                font-size: 24px;
            }
            .btn-login {
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <div class="logo-icon">
            <i class="fas fa-book-open"></i>
        </div>
        <h1>novabooks</h1>
        <p>minimalist reader's sanctuary</p>
    </div>

    <h2>welcome back</h2>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="login()">
        <i class="fas fa-arrow-right-to-bracket"></i> Sign in
    </button>

    <div id="message" class="message" style="display: none;"></div>

    <div class="extra">
        Don’t have an account? <a href="signup.html">Create account</a>
    </div>

    <!-- subtle demo hint (only for development, matches minimal style) -->
    <div class="demo-hint">
        <i class="fas fa-flask"></i> demo: <span>admin@bookstore.com</span> / any password
    </div>
</div>

<footer>
    © 2026 novabooks — clean & minimal
</footer>

<script>
    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const messageDiv = document.getElementById("message");

        // reset message style
        messageDiv.style.display = "none";
        messageDiv.innerText = "";

        if (!email) {
            showMessage("✉️ Please enter your email address", "#e85d04");
            return;
        }

        if (!password) {
            showMessage("🔒 Password is required", "#e85d04");
            return;
        }

        // Show loading state on button
        const loginBtn = document.querySelector(".btn-login");
        const originalBtnText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing in...';
        loginBtn.disabled = true;

        try {
            const response = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            // if response not ok, parse error message
            if (!response.ok) {
                let errorMsg = "Invalid email or password";
                try {
                    const errorData = await response.json();
                    if (errorData.message) errorMsg = errorData.message;
                } catch (e) {
                    // fallback to default
                }
                throw new Error(errorMsg);
            }

            const user = await response.json();

            // Save user data to localStorage exactly as main bookstore expects
            localStorage.setItem("user", JSON.stringify(user));

            // Redirect to main bookstore (index.html)
            window.location.href = "index.html";

        } catch (error) {
            console.error("Login error:", error);
            showMessage(`❌ ${error.message || "Authentication failed. Please try again."}`, "#dc2626");
            loginBtn.innerHTML = originalBtnText;
            loginBtn.disabled = false;
        }
    }

    function showMessage(msg, color) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerText = msg;
        messageDiv.style.display = "block";
        messageDiv.style.backgroundColor = color === "#dc2626" ? "#fef2f2" : "#fef9f0";
        messageDiv.style.color = color;
        messageDiv.style.borderLeft = `3px solid ${color}`;
        messageDiv.style.borderRadius = "40px";
        messageDiv.style.textAlign = "center";
        messageDiv.style.padding = "10px 16px";
        messageDiv.style.fontWeight = "500";
    }

    // Optional: allow Enter key to submit
    const passwordInput = document.getElementById("password");
    const emailInput = document.getElementById("email");
    function handleKeyPress(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            login();
        }
    }
    passwordInput.addEventListener("keypress", handleKeyPress);
    emailInput.addEventListener("keypress", handleKeyPress);

    // Prefill demo admin credentials for quick testing (optional but user-friendly)
    // This aligns with the modern/minimalist vibe and helps showcase the flow.
    // Only prefill if inputs are empty (avoids overwriting)
    if (emailInput && !emailInput.value) {
        // Not auto-filling to respect UX, but shows demo hint. For convenience we can optionally fill on click hint.
        const demoHintDiv = document.querySelector(".demo-hint");
        if (demoHintDiv) {
            demoHintDiv.style.cursor = "pointer";
            demoHintDiv.addEventListener("click", () => {
                emailInput.value = "admin@bookstore.com";
                passwordInput.value = "admin123";
                showMessage("✨ Demo credentials inserted. Click 'Sign in'", "#f97316");
                setTimeout(() => {
                    const msgDiv = document.getElementById("message");
                    if (msgDiv.style.display !== "none") {
                        setTimeout(() => {
                            msgDiv.style.opacity = "0";
                            setTimeout(() => {
                                msgDiv.style.display = "none";
                                msgDiv.style.opacity = "1";
                            }, 300);
                        }, 2000);
                    }
                }, 1000);
            });
        }
    }
</script>
</body>
</html>
