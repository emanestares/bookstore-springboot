<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter One — Admin: Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="icon.png"/>
  <link rel="stylesheet" href="admin.css"/>
  <link rel="stylesheet" href="admin-orders.css"/>
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav">
  <a href="/index.html" class="nav-logo">Chapter<sup>One</sup></a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>

    <div class="admin-dropdown" id="adminDropdown">
      <button class="admin-dropdown-btn" onclick="toggleAdminDropdown()">
        ⚙️ Admin Tools <span class="arrow">▾</span>
      </button>
      <div class="admin-dropdown-menu">
        <a href="/index.html"><span class="menu-icon">📚</span>Manage Catalog</a>
        <a href="/admin-orders.html" class="active"><span class="menu-icon">📋</span>Manage Orders</a>
        <div class="menu-divider"></div>
        <a href="/admin-users.html"><span class="menu-icon">👥</span>User Management</a>
      </div>
    </div>

    <button class="btn-text" onclick="logout()">Sign out</button>
    <button class="nav-link" id="themeBtn" onclick="toggleTheme()" style="font-size:.9rem;padding:.4rem .6rem">🌓</button>
  </div>
</nav>

<!-- ── Main Content ── -->
<div class="container">
  <div class="page-head">
    <div>
      <div class="page-eyebrow">Admin Panel</div>
      <div class="page-title">Order Management</div>
      <div class="page-sub">View and update the status of all customer orders</div>
    </div>
    <button class="nav-link" onclick="loadOrders()" style="align-self:flex-end">↻ Refresh</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clip-rule="evenodd"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by order ID or customer…" oninput="renderTable()"/>
    </div>
    <select class="pill" id="statusFilter" onchange="renderTable()">
      <option value="">All Statuses</option>
      <option value="PREPARING">Preparing</option>
      <option value="TO_DELIVER">To Deliver</option>
      <option value="DECLINED">Declined</option>
    </select>
    <span class="count-tag" id="countTag"></span>
  </div>

  <!-- Table -->
  <div class="orders-table-wrap">
    <table id="ordersTable">
      <thead>
        <tr>
          <th class="no-sort"></th>
          <th>Order</th>
          <th>Customer</th>
          <th>Date</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="state-row">
          <td colspan="7"><span class="state-icon">⏳</span>Loading orders…</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="admin-shared.js"></script>
<script src="admin-orders.js"></script>
</body>
</html>
